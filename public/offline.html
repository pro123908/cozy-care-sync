<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <title>Offline | Wellcare Mart</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          Segoe UI,
          sans-serif;
        background: linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
        color: #0f172a;
      }
      .card {
        max-width: 460px;
        width: calc(100% - 48px);
        background: #ffffffcc;
        backdrop-filter: blur(4px);
        border: 1px solid #dbeafe;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 12px 40px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 22px;
      }
      p {
        margin: 0;
        line-height: 1.55;
        color: #334155;
      }
    </style>
  </head>
  <body>
    <main class="card" role="main" aria-live="polite">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="36"
        height="36"
        viewBox="0 0 24 24"
        fill="none"
        stroke="#2563eb"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        style="margin-bottom: 10px"
      >
        <path d="M1 1l22 22" />
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9" />
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <line x1="12" y1="20" x2="12.01" y2="20" />
      </svg>
      <h1>You're offline</h1>
      <p>
        Don't worry &mdash; your cart is saved and we'll reconnect automatically once you're back
        online.
      </p>
      <button
        onclick="window.location.reload()"
        style="
          margin-top: 16px;
          padding: 10px 22px;
          border-radius: 8px;
          border: none;
          background: #2563eb;
          color: #fff;
          font-size: 14px;
          font-weight: 700;
          cursor: pointer;
        "
      >
        Try again
      </button>
    </main>
    <script>
      window.addEventListener("online", () => window.location.reload());
    </script>
  </body>
</html>
