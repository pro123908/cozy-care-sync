<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <title>Offline | Wellcare Mart</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          Segoe UI,
          sans-serif;
        background: linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
        color: #0f172a;
      }
      .card {
        max-width: 460px;
        width: calc(100% - 48px);
        background: #ffffffcc;
        backdrop-filter: blur(4px);
        border: 1px solid #dbeafe;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 12px 40px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 22px;
      }
      p {
        margin: 0;
        line-height: 1.55;
        color: #334155;
      }
    </style>
  </head>
  <body>
    <main class="card" role="main" aria-live="polite">
      <h1>You are offline</h1>
      <p>
        Wellcare Mart requires an internet connection. Please check your connection and try again.
      </p>
      <button
        onclick="window.location.reload()"
        style="
          margin-top: 16px;
          padding: 10px 22px;
          border-radius: 8px;
          border: none;
          background: #2563eb;
          color: #fff;
          font-size: 14px;
          font-weight: 700;
          cursor: pointer;
        "
      >
        Try again
      </button>
    </main>
    <script>
      window.addEventListener("online", () => window.location.reload());
    </script>
  </body>
</html>
